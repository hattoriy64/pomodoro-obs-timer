<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-phase="work">
    <div id="app">
      <!-- フェーズ＆タイマー表示 -->
      <div class="timer-block">
        <span id="phase-label" data-phase="work">作業中</span>
        <span id="time-display" data-phase="work">25:00</span>
      </div>

      <!-- セット数 -->
      <div class="sets-block">
        <span id="sets-display">0 セット完了</span>
      </div>

      <!-- 設定フォーム -->
      <div class="settings-block">
        <label class="setting-item">
          <span>作業</span>
          <input id="work-minutes" type="number" min="1" max="120" value="25" />
          <span>分</span>
        </label>
        <label class="setting-item">
          <span>休憩</span>
          <input id="break-minutes" type="number" min="1" max="120" value="5" />
          <span>分</span>
        </label>
      </div>

      <!-- 操作ボタン -->
      <div class="controls-block">
        <button id="btn-start" class="btn btn-primary">開始</button>
        <button id="btn-pause" class="btn btn-secondary" disabled>一時停止</button>
        <button id="btn-reset" class="btn btn-ghost">リセット</button>
        <button id="btn-reset-sets" class="btn btn-ghost">セットリセット</button>
      </div>
    </div>

    <script type="module" src="dist/main.js"></script>
  </body>
</html>
